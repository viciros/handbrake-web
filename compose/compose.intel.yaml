# ATTENTION:
# if you download this file directly, please ensure to rename it to 'compose.yaml'

services:
  handbrake-server:
    image: ghcr.io/viciros/handbrake-web-server:latest
    container_name: handbrake-web-server
    restart: unless-stopped
    user: 1000:1000 # edit to run as user (uuid:guid) with permissions to access your media. 0:0 to run as root (not recommended).
    group_add:
      - 44 # ensure this matches your group ID for 'video' with the command 'getent group video'
    ports:
      - 9999:9999
    devices:
      - /dev/dri:/dev/dri # this maps your GPU device into the container
    environment:
      - HANDBRAKE_WEB_USERNAME=admin # change before exposing the server
      - HANDBRAKE_WEB_PASSWORD=change-this-password # change before exposing the server
      - local_private_key=copy-generated-server-private-key # start the server once without this to generate keys
      - remote_public_key=copy-generated-worker-public-key # worker public key generated by the server
    volumes:
      - /path/to/your/data:/data
      - /path/to/your/media:/video # server reads inputs and writes outputs here

  handbrake-worker:
    image: ghcr.io/viciros/handbrake-web-worker:latest
    container_name: handbrake-web-worker
    restart: unless-stopped
    user: 1000:1000 # edit to run as user (uuid:guid) with permissions to access your media. 0:0 to run as root (not recommended).
    environment:
      - WORKER_ID=handbrake-worker-intel # give your worker a unique name
      - SERVER_URL=handbrake-server # change if setting up a standalone worker, prefix with http(s):// if necessary
      - SERVER_PORT=9999 # change if using a reverse proxy or the port is otherwise different than above
      - local_private_key=copy-generated-worker-private-key # worker private key generated by the server
      - remote_public_key=copy-generated-server-public-key # server public key generated by the server
    depends_on:
      - handbrake-server
