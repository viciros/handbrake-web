name: Wiki Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/wiki-publish.yaml

concurrency:
  group: wiki-publish
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Andrew-Chen-Wang/github-wiki-action@v5
        with:
          path: docs/
