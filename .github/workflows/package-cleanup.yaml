name: Package Cleanup

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Docker Publish]
    types: [completed]
  pull_request:
    types: [closed]
  push:
    paths:
      - '.github/workflows/package-cleanup.yaml'
      - '.github/scripts/cleanup-ghcr-versions.sh'

env:
  PACKAGE_NAMES: handbrake-web-server handbrake-web-worker handbrake-build handbrake-cli

jobs:
  cleanup-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.repository.default_branch || github.sha }}

      - name: Clean Old PR's 'pr-*' Versions
        if: github.event_name == 'workflow_run' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          TAG_REGEX: '^pr-[0-9]+$'
          MAX_AGE_SECONDS: 604800
        run: bash .github/scripts/cleanup-ghcr-versions.sh

      - name: Clean This PR's 'pr-*' Versions
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          TAG_REGEX: '^pr-${{ github.event.number }}$'
          MAX_AGE_SECONDS: 0
        run: bash .github/scripts/cleanup-ghcr-versions.sh

      - name: Clean 'sha256-*' Versions
        if: github.event_name == 'workflow_run' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          TAG_REGEX: '^sha256-.*$'
          MAX_AGE_SECONDS: 0
        run: bash .github/scripts/cleanup-ghcr-versions.sh
