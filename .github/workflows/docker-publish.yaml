name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      handbrake_base:
        description: How to handle the HandBrake base image for this manual run.
        required: true
        default: force
        type: choice
        options:
          - auto
          - force
          - reuse
  push:
    branches:
      - dev
    paths:
      - .github/workflows/docker-publish.yaml
      - client/**
      - docker/**
      - handbrake/build.Dockerfile
      - server/**
      - shared/**
      - worker/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  pull_request:
    branches:
      - dev
    paths:
      - .github/workflows/docker-publish.yaml
      - client/**
      - docker/**
      - handbrake/build.Dockerfile
      - server/**
      - shared/**
      - worker/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-handbrake-base:
    runs-on: ubuntu-latest

    outputs:
      build-tag: ${{ steps.base-image.outputs.build-tag }}
      should-build: ${{ steps.base-image.outputs.should-build }}
      tag: ${{ steps.base-image.outputs.tag }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get HandBrake version
        run: cat handbrake/build.Dockerfile | grep -oP '(?<=ARG\s)(HANDBRAKE_VERSION=.+)' >> $GITHUB_ENV

      - name: Check for version env variable
        if: ${{ env.HANDBRAKE_VERSION == '' }}
        run: |
          echo "Critical environment variable 'HANDBRAKE_VERSION' does not exist. Exiting job with error."
          exit 1

      - name: Determine HandBrake base image
        id: base-image
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"
          manual_base="${{ github.event_name == 'workflow_dispatch' && inputs.handbrake_base || 'auto' }}"
          build_tag="${{ github.ref_name }}"
          reuse_tag="${{ github.ref_name }}"
          should_build=false

          if [[ "$event_name" == "workflow_dispatch" && "$manual_base" == "force" ]]; then
            echo "Manual run requested a HandBrake base rebuild."
            should_build=true
          elif [[ "$event_name" == "workflow_dispatch" && "$manual_base" == "reuse" ]]; then
            echo "Manual run requested reuse of the existing HandBrake base image."
            should_build=false
          elif [[ "$event_name" == "release" ]]; then
            build_tag="latest"
            reuse_tag="$HANDBRAKE_VERSION"
            previous_tag="$(git tag --sort=-creatordate | grep -Fvx -- '${{ github.ref_name }}' | head -n 1 || true)"

            if [[ -z "$previous_tag" ]]; then
              echo "No previous tag found; the HandBrake base will be built."
              should_build=true
            else
              base_sha="$previous_tag"
              head_sha="${{ github.sha }}"
            fi
          elif [[ "$event_name" == "pull_request" ]]; then
            build_tag="pr-${{ github.event.number }}"
            reuse_tag="${{ github.base_ref }}"
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            if [[ "$event_name" == "workflow_dispatch" ]]; then
              base_sha="$(git rev-parse HEAD^ 2>/dev/null || true)"
            else
              base_sha="${{ github.event.before }}"
            fi
            head_sha="${{ github.sha }}"
          fi

          if [[ "$event_name" == "workflow_dispatch" && "$manual_base" == "reuse" ]]; then
            :
          elif [[ "$should_build" != "true" ]]; then
            if [[ "$base_sha" =~ ^0+$ ]]; then
              echo "No usable base SHA found; the HandBrake base will be built."
              should_build=true
            else
              changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

              if grep -Eq '^(handbrake/build\.Dockerfile|\.github/workflows/docker-publish\.yaml)$' <<< "$changed_files"; then
                should_build=true
              fi
            fi
          fi

          if [[ "$should_build" == "true" ]]; then
            tag="$build_tag"
          else
            tag="$reuse_tag"
          fi

          echo "build-tag=$build_tag" >> "$GITHUB_OUTPUT"
          echo "should-build=$should_build" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          echo "HandBrake base rebuild required: $should_build"
          echo "HandBrake base tag for app builds: $tag"

  build-handbrake-base:
    runs-on: ubuntu-latest
    needs: prepare-handbrake-base
    if: ${{ needs.prepare-handbrake-base.outputs.should-build == 'true' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get HandBrake version
        run: cat handbrake/build.Dockerfile | grep -oP '(?<=ARG\s)(HANDBRAKE_VERSION=.+)' >> $GITHUB_ENV

      - name: Check for version env variable
        if: ${{ env.HANDBRAKE_VERSION == '' }}
        run: |
          echo "Critical environment variable 'HANDBRAKE_VERSION' does not exist. Exiting job with error."
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/handbrake-build
          tags: |
            type=raw,value=${{ needs.prepare-handbrake-base.outputs.build-tag }}
            type=raw,value=${{ env.HANDBRAKE_VERSION }},enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: handbrake/build.Dockerfile
          platforms: linux/amd64
          provenance: mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=handbrake-build
          cache-to: type=gha,mode=max,scope=handbrake-build

  build-handbrake-web:
    runs-on: ubuntu-latest
    needs:
      - prepare-handbrake-base
      - build-handbrake-base
    if: ${{ always() && needs.prepare-handbrake-base.result == 'success' && (needs.build-handbrake-base.result == 'success' || needs.build-handbrake-base.result == 'skipped') }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: handbrake-web-server
            file: server/Dockerfile

          - image: handbrake-web-worker
            file: worker/Dockerfile

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine application version
        id: app-version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            version="pr-${{ github.event.number }}"
          else
            version="${{ github.ref_name }}"
          fi

          echo "version=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.app-version.outputs.version }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          build-args: |
            DISTROLESS_VARIANT=${{ github.head_ref == '' && 'nonroot' || 'debug-nonroot' }}
            HANDBRAKE_BUILD_TAG=${{ needs.prepare-handbrake-base.outputs.tag }}
            APP_VERSION=${{ steps.app-version.outputs.version }}
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{matrix.image}}
          cache-to: type=gha,mode=max,scope=${{matrix.image}}

      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see "[AUTOTITLE](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds)."
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.REPO_OWNER}}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
